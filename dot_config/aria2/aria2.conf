# ── Download ──────────────────────────────────────────
dir=~/Downloads
continue=true
max-concurrent-downloads=5
max-connection-per-server=16
min-split-size=5M
split=16
file-allocation=none          # faster start, no preallocation
disk-cache=64M

# ── Retry ─────────────────────────────────────────────
max-tries=5
retry-wait=3
timeout=60
connect-timeout=30

# ── Session (resume after crash) ──────────────────────
input-file=~/.config/aria2/session.txt
save-session=~/.config/aria2/session.txt
save-session-interval=30

# ── RPC (for web UI / scripts) ────────────────────────
enable-rpc=true
rpc-listen-all=false          # localhost only (safer)
rpc-listen-port=6800
rpc-secret=changeme           # ← set a strong secret

# ── BitTorrent ────────────────────────────────────────
bt-enable-lpd=true
bt-max-peers=50
max-upload-limit=1M
seed-ratio=1.0
seed-time=60

# ── Logging ───────────────────────────────────────────
log-level=warn
