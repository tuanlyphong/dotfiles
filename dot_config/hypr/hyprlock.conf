# PASSWORD-BOX
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgba(00aaee44)
    inner_color = rgba(11111b29)
    font_color = rgb(00bbff)
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgb(da9367)
    fail_color = rgb(e36b88) # if authentication failed, changes outer_color and fail message color
    fail_text =
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    position = 0, 125
    halign = center
    valign = bottom
}

# NOW TIME
label {
    monitor =
    text = cmd[update:2000] echo $(date +"%H:%M:%S")
    color = rgb(00bbff)
    font_size = 140
    font_family = Power Of Dragon Regular 
    position = 0, 300
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo $(date +"%A, %d %B %Y")
    color = rgb(EEDDFF)
    font_size = 48
    font_family = Power Of Dragon Regular  
    position = 0, 160
    halign = center
    valign = center
}

