# WALLPAPER
$wall = ~/Pictures/Assets/lockscreen.jpg

general {
    grace = 0
}

# BACKGORUND
background {
    monitor =
    path = $wall
    blur_size = 5
    blur_passes = 2 # 0 disables blurring
    noise = 0.0117
    contrast = 1.6000 # Vibrant!!!
    brightness = 0.5000
    vibrancy = 0.2500
    vibrancy_darkness = 0.1000
}

# PROFILE
image {
    monitor =
    path = ~/Pictures/Assets/dp.png
    size = 260
    border_size = 0
    rounding = 0
    rotate = 0
    reload_time = 0
    reload_cmd =
    position = 0, -130
    halign = center
    valign = center
}

# CHITO
