#################
### Workspace ###
#################
windowrulev2 = workspace 4, class:^(org.pwmt.zathura)$
windowrulev2 = workspace 4, class:^(libreoffice.*)$
#windowrulev2 = workspace 3, title:^(Visual Studio Code)$
#windowrulev2 = workspace 3, class:^(zoom)$
windowrulev2 = workspace 1, class:^(mpv)$
#windowrulev2 = workspace 4, title:^(Spotify Free)$
#windowrulev2 = workspace 8, class:^(TimeCanvas)$
windowrulev2 = workspace 5, class:^(org.qbittorrent.qBittorrent)$, title:^(qBittorrent.*)$
#windowrulev2 = workspace 9, class:^(org.telegram.desktop)$
windowrulev2 = workspace 4, class:^(vesktop)$
windowrulev2 = fullscreen, class:^steam_app\d+$
windowrulev2 = monitor 1, class:^steam_app_\d+$
windowrulev2 = workspace 10, class:^steam_app_\d+$
workspace = 10, border:false, rounding:false

###############
### Windows ###
###############
#windowrulev2 = opacity 0.88 0.77, class:^()$ # Enables spotify [no class] transparency
#windowrulev2 = opacity 0.9 0.999999, class:^(.*)$ # Will be applied to all windows
#windowrulev2 = opacity 1 0.999999, class:^(mpv)$
#windowrulev2 = opacity 0.92 0.88, class:^(firefox)$

windowrulev2 = size 800 600, class:^zen-alpha$, title:^Save Image$
windowrulev2 = size 60% 60%, class:^OpenUtau$, title:^Open...$
windowrulev2 = center, class:^OpenUtau$, title:^Save As...$
windowrulev2 = size 60% 60%, class:^OpenUtau$, title:^Save As...$
windowrulev2 = center, class:^OpenUtau$, title:^Open...$

windowrulev2 = float, class:^(imv)$
windowrulev2 = float, class:^(org.qbittorrent.qBittorrent)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = float, class:^(nemo)$
windowrulev2 = float, class:^(code)$
windowrulev2 = float, class:^(TimeCanvas)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(org.pwmt.zathura)$
windowrulev2 = center, class:^(TimeCanvas)$
windowrulev2 = center, class:^(imv)$
windowrulev2 = float, class:.*, title:^(Open File.*)$

windowrulev2 = size 75% 75%, class:^(imv)$
#windowrulev2 = size 64% 70%, class:^(kitty)$
windowrulev2 = size 80% 80%, class:^(org.pwmt.zathura)$

windowrulev2 = tile, class:^(org.qbittorrent.qBittorrent)$, title:^(qBittorrent.*)$
windowrulev2 = suppressevent maximize, class:.*

##################
### LayerRules ###
##################
layerrule = blur, waybar
layerrule = blur, rofi
layerrule = blur, notifications
layerrule = ignorealpha, waybar
layerrule = ignorealpha, rofi
layerrule = ignorealpha, notifications
layerrule = dimaround, rofi

