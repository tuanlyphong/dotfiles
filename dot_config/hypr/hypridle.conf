general {
lock_cmd = pidof hyprlock || hyprlock
before_sleep_cmd = pidof hyprlock || hyprlock
after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
timeout = 600
on-timeout = pidof hyprlock || hyprlock
}

listener {
timeout = 900
on-timeout = brightnessctl -e4 -s set 35%
on-resume = brightnessctl -r || sleep 1; notify-send 'YUKA' 'Where did you go Darling?😟'
}

listener {
timeout = 1000
on-timeout = hyprctl dispatch dpms off
on-resume = hyprctl dispatch dpms on || sleep 1; notify-send 'Welcome back!🥰, I miss you so much🥹'
}

