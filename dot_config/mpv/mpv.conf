#####################
# Video & Rendering #
#####################
# Use the modern, highly-optimized render pipeline
vo=gpu-next
# Vulkan offers the smoothest performance under Wayland/Hyprland
gpu-api=vulkan
# Match display refresh rate exactly to prevent judder
video-sync=display-resample
# Keep the player window open after the video finishes
keep-open=yes

######################
# Hardware Decoding  #
######################
# Forces efficient Intel VA-API decoding, freeing up your CPU entirely
hwdec=vaapi
hwdec-codecs=all

############################
# Scaling & Quality (High) #
############################
# Sharp, clear upscaling with no performance penalty on a GTX 950M
scale=spline36
# Clean downscaling if playing anything larger than 1080p
dscale=mitchell
# High-quality chroma (color) reconstruction
cscale=spline36

#######################################
# Anti-Banding (Crucial for Anime) #
#######################################
# Eliminates blocky lines/gradients in flat colors (skies, dark rooms)
deband=yes
# Number of deband passes (2 is the sweet spot for performance)
deband-iterations=2
# Strength of the filter
deband-threshold=35
# Radius of the filter
deband-range=16
# Injects subtle grain to mask banding artifacts naturally
deband-grain=5

#########################
# Subtitles & Language #
#########################
# Scale subtitles with the window size correctly
sub-scale-with-window=yes
# Automatically load any subtitle file containing the video name
sub-auto=fuzzy
# Search for subtitles in folders named "srt", "subs", or "subtitles"
sub-file-paths=ass:srt:sub:subs:subtitles
# Blend subtitles into the video frame matching the video's color space
blend-subtitles=video
# Pre-load subtitles to prevent lagging when text appears
demuxer-mkv-subtitle-preroll=yes

##############################
# Window & Wayland Behavior #
##############################
# Allow dragging and dropping external subtitles into the player window
drag-and-drop=append
# Start mpv in the center of your screen
geometry=50%:50%
# Limit initial window size to a maximum of 90% of your 1080p screen
autofit=90%x90%

###################
# Audio & Language#
###################
# Automatically prefer Japanese audio track
alang=jpn,jp,japanese
# Automatically prefer English subtitle track
slang=vn,eng,en,english
# Normalizes volume across different audio streams
volume-max=150

