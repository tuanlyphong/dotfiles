
[manager]
ratio = [1, 3, 4]
sort_by = "mtime"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "mtime"
show_hidden = true
show_symlink = true
scrolloff = 5

[preview]
tab_size = 4
max_width = 1200
max_height = 1200
cache_dir = ""
image_filter = "lanczos3"
image_quality = 90

[opener]
# Text editors
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" },
  { run = 'code "%*"', orphan = true, desc = "code", for = "windows" },
  { run = 'code -w "%*"', block = true, desc = "code (block)", for = "windows" },
]

# Default system opener
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
  { run = 'open "$@"', desc = "Open", for = "macos" },
  { run = 'start "" "%1"', orphan = true, desc = "Open", for = "windows" },
]

# File reveal in system file manager
reveal = [
  { run = 'open -R "$1"', desc = "Reveal", for = "macos" },
  { run = 'explorer /select, "%1"', orphan = true, desc = "Reveal", for = "windows" },
  { run = '''exiftool "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show EXIF", for = "unix" },
]


# Archive extraction (unified)
extract = [
  { run = 'bsdtar -xf "$1"', desc = "Extract here (bsdtar)", for = "unix" },
  { run = '7z x "$1"', desc = "Extract here (7z)", for = "unix" },
  { run = '7z x "%1"', desc = "Extract here (7z)", for = "windows" },
]
# Media player
play = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
  { run = 'mpv "%1"', orphan = true, for = "windows" },
  { run = '''mediainfo "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show media info", for = "unix" },
]

[open]
rules = [
  # Directories
  { mime = "inode/directory", use = ["edit", "open", "reveal"] },

  # Text files
  { mime = "text/*", use = ["edit", "reveal"] },
  { mime = "application/json", use = ["edit", "reveal"] },
  { mime = "*/javascript", use = ["edit", "reveal"] },
  { mime = "*/xml", use = ["edit", "reveal"] },
  { mime = "inode/x-empty", use = ["edit", "reveal"] },

  # Images
  { mime = "image/*", use = ["open", "reveal"] },

  # Video
  { mime = "video/*", use = ["play", "reveal"] },

  # Audio
  { mime = "audio/*", use = ["play", "reveal"] },

  # Archives - comprehensive list
  { mime = "application/zip", use = ["extract", "reveal"] },
  { mime = "application/x-zip-compressed", use = ["extract", "reveal"] },
  { mime = "application/gzip", use = ["extract", "reveal"] },
  { mime = "application/x-gzip", use = ["extract", "reveal"] },
  { mime = "application/x-tar", use = ["extract", "reveal"] },
  { mime = "application/x-bzip", use = ["extract", "reveal"] },
  { mime = "application/x-bzip2", use = ["extract", "reveal"] },
  { mime = "application/x-7z-compressed", use = ["extract", "reveal"] },
  { mime = "application/x-rar", use = ["extract", "reveal"] },
  { mime = "application/x-rar-compressed", use = ["extract", "reveal"] },
  { mime = "application/vnd.rar", use = ["extract", "reveal"] },
  { mime = "application/x-xz", use = ["extract", "reveal"] },
  { mime = "application/xz", use = ["extract", "reveal"] },
  { mime = "application/x-lzip", use = ["extract", "reveal"] },
  { mime = "application/x-compress", use = ["extract", "reveal"] },
  { mime = "application/x-compressed-tar", use = ["extract", "reveal"] },
  { mime = "application/x-lzma", use = ["extract", "reveal"] },

  # Fallback
  { mime = "*", use = ["open", "reveal"] },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
image_alloc = 536870912  # 512MB
image_bound = [0, 0]
suppress_preload = false


[plugin]
prepend_previewers = [
  { mime = "video/*", run = "mediainfo" },
  { mime = "audio/*", run = "mediainfo" },
  { mime = "application/vnd.apache.parquet", run = "duckdb" },
  { mime = "text/csv", run = "duckdb" },
]
preloaders = [
  { mime = "image/vnd.djvu", run = "noop" },
  { mime = "image/*", run = "image" },
  { mime = "video/*", run = "video" },
  { mime = "application/pdf", run = "pdf" },
]
previewers = [
  { mime = "inode/directory", run = "folder", sync = true },
  # Code
  { mime = "text/*", run = "code" },
  { mime = "*/xml", run = "code" },
  { mime = "*/cs", run = "code" },
  { mime = "*/javascript", run = "code" },
  { mime = "*/x-wine-extension-ini", run = "code" },
  { mime = "*/js", run = "code" },
  # JSON
  { mime = "application/json", run = "json" },
  # Image
  { mime = "image/vnd.djvu", run = "noop" },
  { mime = "image/*", run = "image" },
  # Video
  { mime = "video/*", run = "video" },
  # PDF
  { mime = "application/pdf", run = "pdf" },
  # Archive
  { mime = "application/*zip*", run = "archive" },
  { mime = "application/*tar*", run = "archive" },
  { mime = "application/*rar*", run = "archive" },
  { mime = "application/*7z*", run = "archive" },
  { mime = "application/*compress*", run = "archive" },
  { mime = "application/gzip", run = "archive" },
  { mime = "application/x-bzip*", run = "archive" },
  { mime = "application/*xz*", run = "archive" },
  # Fallback
  { mime = "*/*", run = "file" },
]

[input]
cd_title = "Change directory:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

create_title = ["Create:", ""]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

rename_title = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

trash_title = "Move {n} selected file{s} to trash? (y/N)"
trash_origin = "top-center"
trash_offset = [0, 2, 50, 3]

delete_title = "Delete {n} selected file{s} permanently? (y/N)"
delete_origin = "top-center"
delete_offset = [0, 2, 50, 3]

filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

find_title = ["Find next:", "Find previous:"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

search_title = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

overwrite_title = "Overwrite an existing file? (y/N)"
overwrite_origin = "top-center"
overwrite_offset = [0, 2, 50, 3]

quit_title = "{n} task{s} running, sure to quit? (y/N)"
quit_origin = "top-center"
quit_offset = [0, 2, 50, 3]

[select]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by = "none"
sort_sensitive = false
sort_reverse = false

[log]
enabled = false
