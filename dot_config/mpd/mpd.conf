# ── Paths ────────────────────────────────────────────────
music_directory    "~/Music"
playlist_directory "~/.local/share/mpd/playlists"
db_file            "~/.local/share/mpd/database"
log_file           "~/.local/share/mpd/mpd.log"
state_file         "~/.local/share/mpd/mpdstate"
sticker_file       "~/.local/share/mpd/sticker.sql"

# ── Networking ───────────────────────────────────────────
bind_to_address    "127.0.0.1"
port               "6600"

# Optional: Unix socket (faster, ncmpcpp can use it)
# bind_to_address    "~/.config/mpd/socket"
#
# ── Audio output ─────────────────────────────────────────
# Use pipewire (preferred on modern systems)
audio_output {
    type            "pipewire"
    name            "PipeWire"
}

# Fallback: PulseAudio
# audio_output {
#     type            "pulse"
#     name            "PulseAudio"
# }

# Visualizer (FIFO — feeds ncmpcpp visualizer)
audio_output {
    type            "fifo"
    name            "Visualizer"
    path            "/tmp/mpd.fifo"
    format          "44100:16:2"
}

# ── Quality ──────────────────────────────────────────────
audio_buffer_size  "4096"       # kB; increase if you get dropouts
replaygain         "auto"       # track | album | auto | off
replaygain_preamp  "0"          # dB; raise to +6 if tracks feel quiet
volume_normalization "no"       # prefer replaygain over hard normalization

# ── Behavior ─────────────────────────────────────────────
auto_update        "yes"        # watch music_directory for changes
auto_update_depth  "10"
follow_outside_symlinks "yes"
follow_inside_symlinks  "yes"
save_absolute_paths_in_playlists "no"
metadata_to_use    "artist,album,title,track,name,genre,date,composer,performer,disc,comment"
zeroconf_enabled   "no"
